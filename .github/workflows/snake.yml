name: Generar serpiente de contribuciones

on:
  schedule:
    # se ejecuta cada 6 horas
    - cron: "0 */6 * * *"
  # permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # y cada vez que haces push a main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generar SVG de la serpiente
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#C4540A&color_dots=#1a1208,#8B3A0F,#C4540A,#C4873A,#E8D4A8

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
